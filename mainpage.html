<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>AnalyzingMedicalData</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
</head>

  <body>
      <h1 id="title">Welcome to Analyzing Medical Data</h1>
      <h2>Linear Regression Model</h2>
    <button onclick="fetchModel()">Fetch Model</button>
    <div>
        <img id="regressionPlot" src="" alt="Linear Regression Plot">
    </div>

    <script>
        async function fetchModel() {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/linear-regression');
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                document.getElementById('regressionPlot').src = url;
            } catch (error) {
                console.error('Error fetching model:', error);
            }
        }
    </script>
  </body>

</html>
