<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>AnalyzingMedicalData</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
</head>

  <body>
      <h1 id="title">Welcome to Analyzing Medical Data</h1>
      <h1>Linear Regression Model</h1>
    <button onclick="fetchModel()">Fetch Model</button>
    <div id="model"></div>

    <script>
        async function fetchModel() {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/linear-regression');
                const data = await response.json();
                console.log(data);
                displayModel(data);
            } catch (error) {
                console.error('Error fetching model:', error);
            }
        }

        function displayModel(data) {
            const modelDiv = document.getElementById('model');
            modelDiv.innerHTML = `
                <p>Intercept: ${data.intercept}</p>
                <p>Coefficient: ${data.coefficient}</p>
            `;
        }
    </script>
  </body>

</html>
